<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#0f0f1a; font-family:'Inter',sans-serif;">
    <div style="max-width:480px; margin:40px auto; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius:16px; overflow:hidden; border:1px solid rgba(108,99,255,0.3);">
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #6C63FF, #4834d4); padding:32px; text-align:center;">
            <h1 style="margin:0; color:#fff; font-size:24px; font-weight:700;">🗳️ VoteSecure</h1>
            <p style="margin:8px 0 0; color:rgba(255,255,255,0.8); font-size:14px;">Your One-Time Password</p>
        </div>
        <!-- Body -->
        <div style="padding:32px; text-align:center;">
            <p style="color:rgba(255,255,255,0.7); font-size:15px; margin:0 0 24px;">Use the following code to verify your identity:</p>
            <div style="background: rgba(108,99,255,0.15); border:2px dashed #6C63FF; border-radius:12px; padding:20px; margin:0 0 24px;">
                <span style="font-size:36px; font-weight:800; letter-spacing:12px; color:#6C63FF;">{{ otp }}</span>
            </div>
            <p style="color:rgba(255,255,255,0.5); font-size:13px; margin:0;">This code is valid for a single use. Do not share it with anyone.</p>
        </div>
        <!-- Footer -->
        <div style="padding:16px 32px; background:rgba(0,0,0,0.2); text-align:center;">
            <p style="margin:0; color:rgba(255,255,255,0.3); font-size:12px;">&copy; 2026 VoteSecure</p>
        </div>
    </div>
</body>
</html>
