{% extends "base.html" %}

{% block title %}Identify Yourself — VoteSecure{% endblock %}

{% block content %}
<div class="glass-container" style="max-width: 500px;">
    <div class="premium-card">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="font-size: 48px; margin-bottom: 16px;">🔑</div>
            <h2 class="text-gradient">Secure Access</h2>
            <p style="margin-top: 8px; font-size: 14px;">
                Enter your details to receive an encrypted 
                verification code.
            </p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input 
                    type="email" 
                    name="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="name@example.com" 
                    required 
                    oninput="toggleAdminFields()"
                >
            </div>

            <div id="password-group" class="form-group" style="display: none;">
                <label class="form-label">Admin Password</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="••••••••"
                >
            </div>

            <button type="submit" id="login-btn" class="btn-premium btn-primary" style="width: 100%; border: none;">
                <i class="fas fa-paper-plane"></i>
                <span>Send OTP</span>
            </button>
        </form>

        <div style="margin-top: 32px; text-align: center;">
            <a href="{{ url_for('index') }}" style="font-size: 13px; color: var(--text-dim); text-decoration: none; font-weight: 600;">
                <i class="fas fa-chevron-left" style="margin-right: 4px;"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>

<script>
function toggleAdminFields() {
    const email = document.getElementById('email').value.toLowerCase();
    const passwordGroup = document.getElementById('password-group');
    const loginBtn = document.getElementById('login-btn');
    const btnSpan = loginBtn.querySelector('span');
    const btnIcon = loginBtn.querySelector('i');
    
    if (email === 'admin@gmail.com') {
        passwordGroup.style.display = 'block';
        document.getElementById('password').required = true;
        btnSpan.innerText = 'Admin Login';
        btnIcon.className = 'fas fa-shield-alt';
    } else {
        passwordGroup.style.display = 'none';
        document.getElementById('password').required = false;
        btnSpan.innerText = 'Send OTP';
        btnIcon.className = 'fas fa-paper-plane';
    }
}
</script>
{% endblock %}
